<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-mealy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="55%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#0b1220" />
    </linearGradient>
    <radialGradient id="glow-mealy" cx="20%" cy="20%" r="85%">
      <stop offset="0%" stop-color="rgba(224,242,254,0.32)" />
      <stop offset="60%" stop-color="rgba(34,211,238,0.06)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0)" />
    </radialGradient>
    <pattern id="grid-mealy" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="rgba(0,0,0,0.30)" />
    </filter>
  </defs>

  <rect width="400" height="250" rx="24" fill="url(#bg-mealy)" />
  <rect width="400" height="250" rx="24" fill="url(#glow-mealy)" />
  <rect width="400" height="250" rx="24" fill="url(#grid-mealy)" opacity="0.9" />

  <!-- Title pill -->
  <g filter="url(#shadow)">
    <rect x="32" y="182" width="336" height="42" rx="999" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.18)" />
  </g>
  <text x="200" y="210" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.92)" letter-spacing="0.2">
    Mealybug Detection AI
  </text>

  <!-- Icon -->
  <g fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)">
    <ellipse cx="160" cy="122" rx="54" ry="40" />
    <circle cx="246" cy="96" r="28" />
    <path d="M120 122 L84 122" />
    <path d="M200 122 L238 122" />
    <path d="M160 84 L160 52" />
    <path d="M140 160 L122 186" />
    <path d="M180 160 L198 186" />
  </g>
</svg>
