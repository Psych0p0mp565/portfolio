  </defs>

  <rect width="400" height="250" rx="24" fill="url(#bg-db)" />
  <rect width="400" height="250" rx="24" fill="url(#glow-db)" />
  <rect width="400" height="250" rx="24" fill="url(#grid-db)" opacity="0.9" />

  <!-- Title pill -->
  <g filter="url(#shadow)">
    <rect x="32" y="26" width="336" height="42" rx="999" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.18)" />
  </g>
  <text x="200" y="54" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.92)" letter-spacing="0.2">
    Database Platform
  </text>

  <!-- Icon -->
  <g fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)">
    <ellipse cx="200" cy="92" rx="112" ry="30" />
    <path d="M88 92 V182 C88 198 126 210 200 210 C274 210 312 198 312 182 V92" />
    <path d="M88 138 C88 154 126 166 200 166 C274 166 312 154 312 138" />
    <path d="M88 182 C88 198 126 210 200 210 C274 210 312 198 312 182" />
