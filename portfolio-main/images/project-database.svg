<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-db" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c9cff" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#0b1220" />
    </linearGradient>
    <radialGradient id="glow-db" cx="25%" cy="20%" r="85%">
      <stop offset="0%" stop-color="rgba(191,219,254,0.30)" />
      <stop offset="65%" stop-color="rgba(59,130,246,0.06)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0)" />
    </radialGradient>
    <pattern id="grid-db" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="rgba(0,0,0,0.30)" />
